version: '1'
services:
  backend:
    build: ./back-end
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - HOST_PATH=${HOST_PATH}
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
  frontend:
    build: ./front-end
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
  mc-java21:
    image: mc-java21
    build:
      context: ./docker_images/java21
    profiles:
      - build-only