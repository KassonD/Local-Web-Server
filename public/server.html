<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MyServer</title>
        <link href="/css/style.css" rel="stylesheet">
    </head>
    <body class="mainBody" onload="enableServerButtons()">
        <h3 class="mainHeader">
            <a href="/" class="headerContent">My Servers</a>
            <a href="/settings.html" class="headerContent">
                <img src="/images/settingsCogs.png" alt="Settings">
            </a>
        </h3>
        <div class="mainContent">
            <div class="tabs">
                <ul>
                    <li data-tab-target="#server" class="active tab">Server</li>
                    <li data-tab-target="#properties" class="tab">Properties</li>
                </ul>
                <div id="server" data-tab-content class="active">
                    
                    <div class="tabButtonContainer">
                        <button id="button_start" class="standardButton startButton" onclick="startServer()" disabled>Start</button>
                        <button id="button_stop" class="standardButton stopButton" onclick="stopServer()" disabled>Stop</button>
                    </div>
                    
                    <p id="output">
                        This will be the output
                    </p>

                    <input></input>
                </div>
                <div id="properties" data-tab-content>
                    properties content
                </div>
            </div>
        </div>

        <script src="/scripts/serverPage.js"></script>
        <script>
            checkServerStatus();
        </script>
    </body>
</html>
